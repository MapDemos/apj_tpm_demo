<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mapbox POI Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

  #config-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f3f4f6; }
  .config-card { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); width: 420px; max-width: 90%; }
  .config-card h1 { margin: 0 0 8px; font-size: 20px; }
  .config-card p { margin: 0 0 20px; color: #6b7280; font-size: 13px; }
  .config-card label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; }
  .config-card input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
  .config-card button { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .config-card button:hover { background: #1d4ed8; }
  .err { color: #dc2626; font-size: 12px; margin-top: -10px; margin-bottom: 12px; }

  #main-screen { display: none; height: 100vh; position: relative; }
  #map { width: 100%; height: 100%; }

  #search-box { position: absolute; top: 10px; left: 10px; z-index: 10; width: 320px; max-width: calc(100vw - 80px); transition: left 0.25s ease; }
  #search-input { width: 100%; padding: 10px 36px 10px 12px; border: none; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.2); font-size: 14px; outline: none; }
  #search-clear { position: absolute; right: 10px; top: 10px; background: none; border: none; cursor: pointer; color: #6b7280; font-size: 18px; line-height: 1; padding: 0; display: none; }
  #search-clear.show { display: block; }
  #search-results { margin-top: 4px; background: #fff; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); max-height: 60vh; overflow-y: auto; display: none; }
  #search-results.active { display: block; }
  .search-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
  .search-item:hover { background: #f9fafb; }
  .search-item:last-child { border-bottom: none; }
  .search-item-name { font-size: 14px; font-weight: 600; color: #111827; }
  .search-item-desc { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .search-empty { padding: 14px; text-align: center; color: #6b7280; font-size: 13px; }

  .map-btn { position: absolute; right: 10px; z-index: 10; width: 29px; height: 29px; border-radius: 4px; background: #fff; border: none; cursor: pointer; box-shadow: 0 0 0 2px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
  .map-btn:hover { background: #f3f4f6; }
  .map-btn svg { width: 18px; height: 18px; }
  #filter-btn { top: 130px; }
  #favorites-btn { top: 170px; }
  .map-btn .filter-badge { position: absolute; top: -4px; right: -4px; background: #ef4444; color: #fff; border-radius: 9px; min-width: 16px; height: 16px; font-size: 10px; padding: 0 4px; display: none; align-items: center; justify-content: center; line-height: 1; }
  .map-btn.has-filter .filter-badge { display: flex; }

  #messages { position: absolute; bottom: 16px; left: 16px; z-index: 10; display: flex; flex-direction: column-reverse; gap: 8px; pointer-events: none; max-width: calc(100vw - 32px); transition: left 0.25s ease; }
  .msg { background: rgba(17, 24, 39, 0.88); color: #fff; padding: 10px 14px; border-radius: 6px; font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); animation: slideUp 0.18s ease; display: flex; align-items: center; gap: 8px; pointer-events: auto; }
  .msg-info    { background: rgba(37, 99, 235, 0.92); }
  .msg-warning { background: rgba(245, 158, 11, 0.94); }
  .msg-success { background: rgba(16, 185, 129, 0.94); }
  @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .mapboxgl-popup-content { font-size: 12px; padding: 10px 12px; max-width: 280px; }
  .popup-row { margin: 2px 0; }
  .popup-key { color: #6b7280; font-weight: 600; }
  .popup-cat { display: inline-block; background: #eef2ff; color: #4338ca; padding: 1px 6px; border-radius: 4px; margin: 1px 2px 1px 0; font-size: 11px; }

  /* ===== Details Side Panel ===== */
  #details-panel {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 400px; max-width: 100%;
    background: #fff;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18);
    z-index: 50;
    display: flex; flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
  }
  #details-panel.open { transform: translateX(0); }
  #main-screen.panel-open #search-box { left: 410px; }
  #main-screen.panel-open #messages { left: 410px; }
  @media (max-width: 768px) {
    #details-panel { width: 100%; }
    #main-screen.panel-open #search-box { display: none; }
  }
  .panel-top {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: #f3f4f6; border-bottom: 1px solid #e5e7eb;
    font-size: 11px;
  }
  .panel-id-row {
    flex: 1; min-width: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #6b7280;
    display: flex; align-items: center; gap: 4px;
  }
  .panel-id-value {
    color: #111827; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
  }
  .panel-copy-id { background: none; border: none; cursor: pointer; padding: 2px 4px; font-size: 12px; color: #6b7280; }
  .panel-copy-id:hover { color: #2563eb; }
  #panel-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #6b7280; padding: 0 4px; line-height: 1; }
  #panel-close:hover { color: #111827; }
  .panel-title-row { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; }
  .panel-title-row h2 { margin: 0; font-size: 18px; flex: 1; word-break: break-word; }
  #bookmark-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px; display: flex; align-items: center; }
  #bookmark-btn:hover { background: #f3f4f6; }
  #bookmark-btn svg { width: 22px; height: 22px; fill: none; stroke: #6b7280; stroke-width: 2; }
  #bookmark-btn.active svg { fill: #fbbf24; stroke: #f59e0b; }
  .panel-tabs { display: flex; border-bottom: 1px solid #e5e7eb; padding: 0 20px; }
  .panel-tab { padding: 10px 14px; border: none; background: none; cursor: pointer; font-size: 13px; color: #6b7280; border-bottom: 2px solid transparent; font-weight: 500; }
  .panel-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
  .panel-body { flex: 1; padding: 20px; overflow-y: auto; }
  .panel-body .tab-pane { display: none; }
  .panel-body .tab-pane.active { display: block; }

  /* ===== Modal ===== */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  #filter-history-overlay { z-index: 1100; }
  .modal { background: #fff; border-radius: 12px; width: 560px; max-width: 92%; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-lg { width: 720px; max-height: 90vh; }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .modal-header h2 { margin: 0; font-size: 18px; flex: 1; }
  .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280; line-height: 1; padding: 0 4px; }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  .modal-body.no-padding { padding: 0; }
  .modal-footer { padding: 12px 20px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 8px; }
  .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid transparent; font-weight: 500; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: #fff; color: #374151; border-color: #d1d5db; }
  .btn-secondary:hover { background: #f9fafb; }
  .btn-danger { background: #fff; color: #b91c1c; border-color: #fca5a5; }
  .btn-danger:hover { background: #fef2f2; }

  .modal-tabs { display: flex; border-bottom: 1px solid #e5e7eb; padding: 0 20px; }
  .modal-tabs .tab { padding: 12px 16px; border: none; background: none; cursor: pointer; font-size: 14px; color: #6b7280; border-bottom: 2px solid transparent; font-weight: 500; }
  .modal-tabs .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Details body */
  .panel-body .field, .modal-body .field { margin-bottom: 12px; }
  .panel-body .field-label, .modal-body .field-label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .panel-body .field-value, .modal-body .field-value { font-size: 14px; color: #111827; word-break: break-word; }
  .panel-body a, .modal-body a { color: #2563eb; text-decoration: none; }
  .panel-body a:hover, .modal-body a:hover { text-decoration: underline; }
  .photos { display: flex; flex-direction: column; gap: 8px; }
  .photos img { width: 100%; height: auto; border-radius: 8px; display: block; }
  .loading { text-align: center; padding: 40px; color: #6b7280; }
  .badge { display: inline-block; background: #eef2ff; color: #4338ca; padding: 2px 8px; border-radius: 4px; margin: 2px 4px 2px 0; font-size: 12px; }
  .json-view { background: #1f2937; color: #e5e7eb; padding: 12px; border-radius: 6px; font-size: 11px; line-height: 1.5; overflow: auto; max-height: 70vh; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre; margin: 0; }

  /* Filter tree */
  .filter-toolbar { display: flex; gap: 8px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #e5e7eb; align-items: center; flex-wrap: wrap; }
  .filter-search { flex: 1; min-width: 180px; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; }
  .category-tree .group { margin-bottom: 8px; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden; }
  .category-tree .group-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f9fafb; cursor: pointer; user-select: none; }
  .category-tree .group-header:hover { background: #f3f4f6; }
  .category-tree .group-header .chevron { transition: transform 0.15s; color: #6b7280; font-size: 10px; }
  .category-tree .group.open .group-header .chevron { transform: rotate(90deg); }
  .category-tree .group-name { flex: 1; font-weight: 600; font-size: 13px; }
  .category-tree .count { font-size: 11px; color: #6b7280; }
  .category-tree .group-color { width: 10px; height: 10px; border-radius: 50%; }
  .category-tree .children { display: none; padding: 8px 12px; gap: 4px; grid-template-columns: 1fr 1fr; }
  .category-tree .group.open .children { display: grid; }
  .category-tree .child { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .category-tree .child:hover { background: #f3f4f6; }
  .category-tree input[type="checkbox"] { cursor: pointer; }
  .empty-msg { text-align: center; color: #6b7280; padding: 20px; font-size: 13px; }

  /* Favorites/History list */
  .list-container { max-height: 60vh; overflow-y: auto; }
  .list-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
  .list-item:hover { background: #f9fafb; }
  .list-item:last-child { border-bottom: none; }
  .list-item-main { flex: 1; min-width: 0; }
  .list-item-name { font-weight: 600; font-size: 14px; color: #111827; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .list-item-meta { font-size: 11px; color: #6b7280; font-family: ui-monospace, monospace; }
  .list-item-cats { margin-top: 6px; }
  .list-item-cats .badge { font-size: 10px; padding: 1px 6px; }
  .list-item-remove { background: none; border: none; cursor: pointer; padding: 4px 8px; color: #9ca3af; font-size: 16px; flex-shrink: 0; }
  .list-item-remove:hover { color: #ef4444; }
  .list-item-icon { font-size: 18px; line-height: 1; flex-shrink: 0; margin-top: 2px; }

  /* Filter history list */
  .fhist-item { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
  .fhist-item:hover { background: #f9fafb; }
  .fhist-item-head { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 6px; }
  .fhist-item-count { font-weight: 600; color: #111827; }
  .fhist-item-date { color: #6b7280; font-size: 11px; }
  .fhist-item-preview .badge { font-size: 10px; padding: 1px 6px; }
</style>
</head>
<body>

<div id="config-screen">
  <div class="config-card">
    <h1>Mapbox POI Demo</h1>
    <p>Enter your Mapbox public token (pk.*).</p>
    <label for="token-input">Access Token</label>
    <input id="token-input" type="text" placeholder="pk.eyJ1Ijoi..." />
    <div id="token-err" class="err" style="display:none;">Token must start with "pk."</div>
    <button id="start-btn">Show Map</button>
  </div>
</div>

<div id="main-screen">
  <div id="map"></div>

  <div id="search-box">
    <input id="search-input" type="text" placeholder="Search places..." autocomplete="off" />
    <button id="search-clear" title="Clear">&times;</button>
    <div id="search-results"></div>
  </div>

  <button id="filter-btn" class="map-btn" title="Category Filter">
    <svg viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
    </svg>
    <span class="filter-badge" id="filter-badge">!</span>
  </button>

  <button id="favorites-btn" class="map-btn" title="Bookmarks & History">
    <svg viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"></polygon>
    </svg>
  </button>

  <div id="messages"></div>

  <!-- ====== Side Panel: Details ====== -->
  <aside id="details-panel">
    <div class="panel-top">
      <div class="panel-id-row">
        <span>mapbox_id:</span>
        <span id="panel-id-value" class="panel-id-value" title="">-</span>
        <button class="panel-copy-id" id="panel-copy-id" title="Copy">⎘</button>
      </div>
      <button id="panel-close" title="Close">&times;</button>
    </div>
    <div class="panel-title-row">
      <h2 id="details-title">POI Details</h2>
      <button id="bookmark-btn" title="Bookmark">
        <svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      </button>
    </div>
    <div class="panel-tabs">
      <button class="panel-tab active" data-detail-tab="info">Info</button>
      <button class="panel-tab" data-detail-tab="json">Raw JSON</button>
    </div>
    <div class="panel-body">
      <div id="detail-tab-info" class="tab-pane active"><div class="loading">Loading...</div></div>
      <div id="detail-tab-json" class="tab-pane"><pre class="json-view">Loading...</pre></div>
    </div>
  </aside>
</div>

<!-- ====== Filter Modal ====== -->
<div id="filter-overlay" class="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2>Filter</h2>
      <button class="modal-close" data-close="filter">&times;</button>
    </div>
    <div class="modal-body">
      <div class="filter-toolbar">
        <input id="filter-search" class="filter-search" placeholder="Search categories..." />
        <button class="btn btn-secondary" id="open-filter-history">⟲ Past filters</button>
        <button class="btn btn-secondary" id="check-all">Select All</button>
        <button class="btn btn-secondary" id="uncheck-all">Deselect All</button>
      </div>
      <div id="category-tree" class="category-tree"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="filter">Cancel</button>
      <button class="btn btn-primary" id="apply-filter">Apply</button>
    </div>
  </div>
</div>

<!-- ====== Past Filter Modal (nested) ====== -->
<div id="filter-history-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Past Filters</h2>
      <button class="modal-close" data-close="filter-history">&times;</button>
    </div>
    <div class="modal-body no-padding">
      <div id="filter-history-list" class="list-container"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="clear-filter-history">Clear All</button>
      <button class="btn btn-secondary" data-close="filter-history">Close</button>
    </div>
  </div>
</div>

<!-- ====== Favorites/History Modal ====== -->
<div id="favorites-overlay" class="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2>Bookmarks &amp; History</h2>
      <button class="modal-close" data-close="favorites">&times;</button>
    </div>
    <div class="modal-tabs">
      <button class="tab active" data-fav-tab="bookmarks">★ Bookmarks <span id="bm-count">(0)</span></button>
      <button class="tab" data-fav-tab="poiHistory">⏱ History <span id="hist-count">(0)</span></button>
    </div>
    <div class="modal-body no-padding">
      <div id="fav-tab-bookmarks" class="tab-pane active">
        <div id="bookmarks-list" class="list-container"></div>
      </div>
      <div id="fav-tab-history" class="tab-pane">
        <div id="history-list" class="list-container"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="clear-current-list">Clear All</button>
      <button class="btn btn-secondary" id="export-current-list">⬇ Export</button>
      <button class="btn btn-secondary" data-close="favorites">Close</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
 *  Constants
 * ============================================================ */
const TILESET_ID    = "10da032y.ta_headmap_0511";
const SOURCE_LAYER  = "photos";
const STYLE_URL     = "mapbox://styles/mapbox/standard";
const TOKEN_KEY      = "mapbox_demo_pk_token";
const VISITED_KEY    = "mapbox_demo_visited_pois";
const HISTORY_KEY    = "mapbox_demo_history";
const BOOKMARK_KEY   = "mapbox_demo_bookmarks";
const FILTER_HIST_KEY= "mapbox_demo_filter_history";
const DETAILS_API   = "https://api.mapbox.com/search/details/v1/retrieve/";
const SEARCH_SUGGEST_API  = "https://api.mapbox.com/search/searchbox/v1/suggest";
const SEARCH_RETRIEVE_API = "https://api.mapbox.com/search/searchbox/v1/retrieve/";
const HEATMAP_MIN_ZOOM = 6;
const LABEL_MIN_ZOOM   = 18;
const FILTER_HIST_MAX  = 20;

const TILESETS = [
  { key:"services_business", name:"Services & Business", color:"#2563eb",

/* ============================================================
 *  Helpers
 * ============================================================ */
function generateUUID() {
  if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    const v = c === "x" ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}
function parseCategories(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  if (typeof raw === "string") {
    try { const p = JSON.parse(raw); if (Array.isArray(p)) return p; } catch (_) {}
    return raw.split(",").map(s => s.trim().replace(/^["\[]+|["\]]+$/g, "")).filter(Boolean);
  }
  return [];
}
function extractPhotos(props, meta) {
  const candidates = [props && props.photos, props && props.photo, props && props.images, meta && meta.photos, meta && meta.photo, meta && meta.images];
  for (const c of candidates) {
    if (!Array.isArray(c) || c.length === 0) continue;
    return c.map(p => typeof p === "string" ? p : (p.url || p.src || p.href || p.uri)).filter(Boolean).map(u => u.replace(/^http:\/\//i, "https://"));
  }
  return [];
}
function truncate(s, n) { if (!s) return "-"; s = String(s); return s.length > n ? s.slice(0, n) + "..." : s; }
function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function escapeAttr(s) { return escapeHtml(s); }
function fmtTime(ts) {
  if (!ts) return "-";
  const d = new Date(ts);
  return d.toLocaleString();
}

/* ============================================================
 *  Messages
 * ============================================================ */
const persistentMessages = {};

function showPersistentMessage(id, text, type = "info") {
  const container = document.getElementById("messages");
  if (persistentMessages[id]) {
    persistentMessages[id].querySelector(".msg-text").textContent = text;
    return;
  }
  const el = document.createElement("div");
  el.className = `msg msg-${type}`;
  el.innerHTML = `<span class="msg-text">${escapeHtml(text)}</span>`;
  container.appendChild(el);
  persistentMessages[id] = el;
}
function hidePersistentMessage(id) {
  if (persistentMessages[id]) { persistentMessages[id].remove(); delete persistentMessages[id]; }
}
function showTransientMessage(text, type = "success", duration = 3000) {
  const container = document.getElementById("messages");
  const el = document.createElement("div");
  el.className = `msg msg-${type}`;
  el.innerHTML = `<span class="msg-text">${escapeHtml(text)}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.transition = "opacity 0.3s"; el.style.opacity = "0";
    setTimeout(() => el.remove(), 300);
  }, duration);
}
function updateZoomMessage() {
  if (!map) return;
  if (map.getZoom() < HEATMAP_MIN_ZOOM) showPersistentMessage("zoom-hint", "Please zoom in to see heatmap", "info");
  else hidePersistentMessage("zoom-hint");
}
function updateFilterMessage() {
  if ([...selectedSet].length === 0) showPersistentMessage("filter-empty", "Filter is all deselected", "warning");
  else hidePersistentMessage("filter-empty");
}

 *  Visited / History / Bookmarks storage
 * ============================================================ */
function saveVisited() {
  try { localStorage.setItem(VISITED_KEY, JSON.stringify([...visitedPois])); } catch(e){}
}
function saveHistory() {
  try {
    const obj = {};
    poiHistory.forEach((v, k) => obj[k] = v);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(obj));
  } catch(e){}
}
function saveBookmarks() {
  try {
    const obj = {};
    bookmarks.forEach((v, k) => obj[k] = v);
    localStorage.setItem(BOOKMARK_KEY, JSON.stringify(obj));
  } catch(e){}
  refreshCounts();
}
function saveFilterHistoryStorage() {
  try { localStorage.setItem(FILTER_HIST_KEY, JSON.stringify(filterHistory)); } catch(e){}
}

function markVisited(mapboxId) {
  if (!mapboxId) return;
  if (!visitedPois.has(mapboxId)) {
    visitedPois.add(mapboxId);
    saveVisited();
  }
  map.setFeatureState({ source: "poi-src", sourceLayer: SOURCE_LAYER, id: mapboxId }, { visited: true });
}
function restoreAllVisited() {
  visitedPois.forEach(id => {
    map.setFeatureState({ source: "poi-src", sourceLayer: SOURCE_LAYER, id }, { visited: true });
  });
}

function addToHistory(id, info) {
  if (!id) return;
  const existing = poiHistory.get(id) || {};
  poiHistory.set(id, {
    name: info.name || existing.name || "",
    lat:  info.lat  ?? existing.lat  ?? null,
    lon:  info.lon  ?? existing.lon  ?? null,
    categories: info.categories || existing.categories || [],
    viewedAt: Date.now()
  });
  saveHistory();
}
function updateHistoryName(id, name) {
  if (!poiHistory.has(id) || !name) return;
  const cur = poiHistory.get(id);
  if (cur.name !== name) {
    cur.name = name;
    poiHistory.set(id, cur);
    saveHistory();
  }
}

function toggleBookmark(id) {
  if (!id) return;
  if (bookmarks.has(id)) {
    bookmarks.delete(id);
    showTransientMessage("Removed from bookmarks", "info", 2500);
  } else {
    const histEntry = poiHistory.get(id) || {};
    bookmarks.set(id, {
      name: histEntry.name || "",
      lat:  currentDetailLat ?? histEntry.lat ?? null,
      lon:  currentDetailLon ?? histEntry.lon ?? null,
      categories: histEntry.categories || [],
      addedAt: Date.now()
    });
    showTransientMessage("Added to bookmarks", "success", 2500);
  }
  saveBookmarks();
  updateBookmarkButton(id);
}
function updateBookmarkName(id, name) {
  if (!bookmarks.has(id) || !name) return;
  const cur = bookmarks.get(id);
  if (cur.name !== name) { cur.name = name; bookmarks.set(id, cur); saveBookmarks(); }
}
function updateBookmarkButton(mapboxId) {
  const btn = document.getElementById("bookmark-btn");
  if (!btn) return;
  const on = bookmarks.has(mapboxId);
  btn.classList.toggle("active", on);
  btn.title = on ? "Remove bookmark" : "Add bookmark";
}
function refreshCounts() {
  const bm = document.getElementById("bm-count"); if (bm) bm.textContent = `(${bookmarks.size})`;
  const hi = document.getElementById("hist-count"); if (hi) hi.textContent = `(${poiHistory.size})`;
}

 *  Interactions
 * ============================================================ */
function setupInteractions() {
  const popup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false });

  map.on("mousemove", "poi-symbol", (e) => {
    if (!e.features || !e.features.length) return;
    map.getCanvas().style.cursor = "pointer";
    const p = e.features[0].properties || {};
    const categories = parseCategories(p.categories);
    const idShort = truncate(p.mapbox_id, 12);
    const visited = visitedPois.has(p.mapbox_id);
    const bm = bookmarks.has(p.mapbox_id);
    const html = `
      <div class="popup-row"><span class="popup-key">mapbox_id:</span>
        <span title="${escapeAttr(p.mapbox_id || "")}">${escapeHtml(idShort)}</span>
        ${visited ? '<span style="color:#9ca3af;font-size:10px;margin-left:4px;">(visited)</span>' : ''}
        ${bm ? '<span style="color:#f59e0b;font-size:10px;margin-left:4px;">★</span>' : ''}
      </div>
      <div class="popup-row"><span class="popup-key">lat / lon:</span> ${p.lat ?? "-"}, ${p.lon ?? "-"}</div>
      <div class="popup-row"><span class="popup-key">categories:</span><br/>
        ${categories.map(c => `<span class="popup-cat">${escapeHtml(c)}</span>`).join("")}</div>`;
    popup.setLngLat(e.lngLat).setHTML(html).addTo(map);
  });

  map.on("mouseleave", "poi-symbol", () => {
    map.getCanvas().style.cursor = "";
    popup.remove();
  });

  map.on("click", "poi-symbol", (e) => {
    if (!e.features || !e.features.length) return;
    const p = e.features[0].properties || {};
    if (!p.mapbox_id) return;
    markVisited(p.mapbox_id);
    addToHistory(p.mapbox_id, {
      lat: typeof p.lat === "number" ? p.lat : parseFloat(p.lat),
      lon: typeof p.lon === "number" ? p.lon : parseFloat(p.lon),
      categories: parseCategories(p.categories)
    });
    refreshCounts();
    openDetailsPanel(p.mapbox_id, p);
  });
}

/* ============================================================
 *  Search Box
 * ============================================================ */
function setupSearchBox() {
  const input    = document.getElementById("search-input");
  const results  = document.getElementById("search-results");
  const clearBtn = document.getElementById("search-clear");

  input.addEventListener("input", () => {
    const q = input.value.trim();
    clearBtn.classList.toggle("show", q.length > 0);
    clearTimeout(searchDebounce);
    if (!q) { results.classList.remove("active"); results.innerHTML = ""; return; }
    searchDebounce = setTimeout(() => doSuggest(q), 250);
  });
  input.addEventListener("focus", () => { if (results.innerHTML.trim()) results.classList.add("active"); });
  document.addEventListener("mousedown", (e) => {
    if (!document.getElementById("search-box").contains(e.target)) results.classList.remove("active");
  });
  clearBtn.addEventListener("click", () => {
    input.value = ""; clearBtn.classList.remove("show");
    results.innerHTML = ""; results.classList.remove("active");
    if (searchMarker) { searchMarker.remove(); searchMarker = null; }
    input.focus();
  });
}

async function doSuggest(query) {
  const token = localStorage.getItem(TOKEN_KEY);
  const center = map.getCenter();
  const params = new URLSearchParams({
    q: query, session_token: searchSessionToken,
    proximity: `${center.lng.toFixed(6)},${center.lat.toFixed(6)}`,
    access_token: token, limit: "8"
  });
  try {
    const res = await fetch(`${SEARCH_SUGGEST_API}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderSuggestions(data.suggestions || []);
  } catch (err) {
    console.error("Suggest error:", err);
    renderSuggestions([]);
  }
}

function renderSuggestions(suggestions) {
  const results = document.getElementById("search-results");
  if (!suggestions.length) {
    results.innerHTML = `<div class="search-empty">No results</div>`;
    results.classList.add("active"); return;
  }
  results.innerHTML = suggestions.map(s => `
    <div class="search-item" data-id="${escapeAttr(s.mapbox_id)}">
      <div class="search-item-name">${escapeHtml(s.name || "")}</div>
      <div class="search-item-desc">${escapeHtml(s.place_formatted || s.full_address || s.feature_type || "")}</div>
    </div>`).join("");
  results.classList.add("active");
  results.querySelectorAll(".search-item").forEach(el => {
    el.addEventListener("mousedown", async (ev) => {
      ev.preventDefault();
      const id = el.dataset.id;
      if (!id) return;
      await doRetrieve(id, el.querySelector(".search-item-name").textContent);
    });
  });
}

async function doRetrieve(mapboxId, displayName) {
  const token = localStorage.getItem(TOKEN_KEY);
  const params = new URLSearchParams({ session_token: searchSessionToken, access_token: token });
  try {
    const res = await fetch(`${SEARCH_RETRIEVE_API}${encodeURIComponent(mapboxId)}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const feature = data.features && data.features[0];
    if (!feature || !feature.geometry || !feature.geometry.coordinates) return;
    const coords = feature.geometry.coordinates;
    dropSearchMarker(coords, feature.properties || {});
    document.getElementById("search-input").value = (feature.properties && feature.properties.name) || displayName || "";
    document.getElementById("search-results").classList.remove("active");
    document.getElementById("search-clear").classList.add("show");
    searchSessionToken = generateUUID();
  } catch (err) {
    console.error("Retrieve error:", err);
  }
}

function dropSearchMarker(coords, props) {
  if (searchMarker) searchMarker.remove();
  searchMarker = new mapboxgl.Marker({ color: "#ef4444" }).setLngLat(coords).addTo(map);
  if (props && props.name) {
    searchMarker.setPopup(new mapboxgl.Popup({ offset: 25 }).setHTML(
      `<div style="font-weight:600;font-size:13px;">${escapeHtml(props.name)}</div>
       <div style="font-size:11px;color:#6b7280;">${escapeHtml(props.place_formatted || props.full_address || "")}</div>`
    ));
  }
  const ft = (props && props.feature_type) || "";
  let targetZoom = 14;
  if (ft === "country") targetZoom = 4;
  else if (ft === "region") targetZoom = 6;
  else if (ft === "postcode") targetZoom = 11;
  else if (ft === "district" || ft === "place" || ft === "city") targetZoom = 11;
  else if (ft === "locality" || ft === "neighborhood") targetZoom = 13;
  else if (ft === "address" || ft === "street") targetZoom = 16;
  else if (ft === "poi") targetZoom = 16;
  map.flyTo({ center: coords, zoom: targetZoom, essential: true, duration: 1500 });
}

/* ============================================================
 *  Filter
 * ============================================================ */
function setupFilter() {
  document.getElementById("filter-btn").addEventListener("click", () => {
    renderTree();
    document.getElementById("filter-overlay").classList.add("active");
  });
  document.getElementById("filter-search").addEventListener("input", renderTree);
  document.getElementById("check-all").addEventListener("click", () => {
    ALL_CATEGORIES.forEach(id => selectedSet.add(id));
    renderTree();
  });
  document.getElementById("uncheck-all").addEventListener("click", () => {
    ALL_CATEGORIES.forEach(id => selectedSet.delete(id));
    renderTree();
  });
  document.getElementById("apply-filter").addEventListener("click", () => {
    applyFilter(true);
    closeModal("filter");
    // ★ Auto-close details panel on apply
    closeDetailsPanel();
  });

  // Past filters
  document.getElementById("open-filter-history").addEventListener("click", () => {
    renderFilterHistory();
    document.getElementById("filter-history-overlay").classList.add("active");
  });
  document.getElementById("clear-filter-history").addEventListener("click", () => {
    if (!confirm("Clear all past filters?")) return;
    filterHistory = [];
    saveFilterHistoryStorage();
    renderFilterHistory();
  });
}

function renderTree() {
  const search = (document.getElementById("filter-search").value || "").toLowerCase().trim();
  const container = document.getElementById("category-tree");
  const html = TILESETS.map(t => {
    const visibleChildren = search ? t.categories.filter(c => c.toLowerCase().includes(search)) : t.categories;
    const groupMatches = !search || t.name.toLowerCase().includes(search);
    if (search && !groupMatches && visibleChildren.length === 0) return "";
    const totalCount = t.categories.length;
    const checkedCount = t.categories.filter(c => selectedSet.has(c)).length;
    const allChecked = checkedCount === totalCount && totalCount > 0;
    const indeterminate = checkedCount > 0 && checkedCount < totalCount;
    const open = !!search;
    return `
      <div class="group ${open ? "open" : ""}" data-group="${escapeAttr(t.key)}">
        <div class="group-header">
          <input type="checkbox" class="group-cb" ${allChecked ? "checked" : ""} data-indeterminate="${indeterminate}" />
          <span class="group-color" style="background:${t.color};"></span>
          <span class="group-name">${escapeHtml(t.name)}</span>
          <span class="count">${checkedCount} / ${totalCount}</span>
          <span class="chevron">▶</span>
        </div>
        <div class="children">
          ${visibleChildren.map(c => `
            <label class="child">
              <input type="checkbox" class="leaf-cb" value="${escapeAttr(c)}" ${selectedSet.has(c) ? "checked" : ""}/>
              <span>${escapeHtml(c)}</span>
            </label>`).join("")}
        </div>
      </div>`;
  }).join("");

  container.innerHTML = html || `<div class="empty-msg">No matches.</div>`;
  container.querySelectorAll(".group-cb").forEach(cb => { cb.indeterminate = cb.dataset.indeterminate === "true"; });
  container.querySelectorAll(".group-header").forEach(h => {
    h.addEventListener("click", (e) => {
      if (e.target.classList.contains("group-cb")) return;
      h.parentElement.classList.toggle("open");
    });
  });
  container.querySelectorAll(".group-cb").forEach(cb => {
    cb.addEventListener("click", (e) => e.stopPropagation());
    cb.addEventListener("change", (e) => {
      const groupEl = e.target.closest(".group");
      const groupKey = groupEl.dataset.group;
      const group = TILESETS.find(t => t.key === groupKey);
      if (!group) return;
      if (e.target.checked) group.categories.forEach(c => selectedSet.add(c));
      else                  group.categories.forEach(c => selectedSet.delete(c));
      renderTree();
    });
  });
  container.querySelectorAll(".leaf-cb").forEach(cb => {
    cb.addEventListener("change", (e) => {
      if (e.target.checked) selectedSet.add(e.target.value);
      else selectedSet.delete(e.target.value);
      renderTree();
    });
  });
}

function isFilterActive() {
  return selectedSet.size !== ALL_CATEGORIES.length;
}

function applyFilter(saveToHistory) {
  let filter = null;
  let hasFilter = false;

  const totalAll = ALL_CATEGORIES.length;
  const selected = [...selectedSet].filter(id => ALL_CATEGORIES.includes(id));
  if (selected.length === 0) {
    filter = ["==", ["literal", 1], 0];
    hasFilter = true;
  } else if (selected.length === totalAll) {
    filter = null; hasFilter = false;
  } else {
    filter = ["any", ...selected.map(cat => ["in", cat, ["to-string", ["get", "categories"]]])];
    hasFilter = true;
  }

  if (map.getLayer("poi-symbol"))  map.setFilter("poi-symbol",  filter);
  if (map.getLayer("poi-heatmap")) map.setFilter("poi-heatmap", filter);
  if (map.getLayer("poi-label"))   map.setFilter("poi-label",   filter);

  document.getElementById("filter-btn").classList.toggle("has-filter", hasFilter);
  updateFilterMessage();

  if (saveToHistory && hasFilter) saveFilterSnapshot(selected);
}

function clearFilterIfActive() {
  if (isFilterActive()) {
    selectedSet = new Set(ALL_CATEGORIES);
    applyFilter(false);
    showTransientMessage("Filter cleared", "info", 2500);
  }
}

/* ----- Filter History (past filters) ----- */
function saveFilterSnapshot(categories) {
  const key = [...categories].sort().join(",");
  filterHistory = filterHistory.filter(e => [...e.categories].sort().join(",") !== key);
  filterHistory.unshift({ timestamp: Date.now(), categories: [...categories] });
  if (filterHistory.length > FILTER_HIST_MAX) filterHistory = filterHistory.slice(0, FILTER_HIST_MAX);
  saveFilterHistoryStorage();
}

function renderFilterHistory() {
  const container = document.getElementById("filter-history-list");
  if (!filterHistory.length) {
    container.innerHTML = `<div class="empty-msg">No past filters yet.</div>`;
    return;
  }
  container.innerHTML = filterHistory.map((entry, idx) => {
    const preview = entry.categories.slice(0, 5).map(c => `<span class="badge">${escapeHtml(c)}</span>`).join("");
    const more = entry.categories.length > 5 ? `<span class="badge">+${entry.categories.length - 5}</span>` : "";
    return `
      <div class="fhist-item" data-idx="${idx}">
        <div class="fhist-item-head">
          <span class="fhist-item-count">${entry.categories.length} categories</span>
          <span class="fhist-item-date">${escapeHtml(fmtTime(entry.timestamp))}</span>
        </div>
        <div class="fhist-item-preview">${preview}${more}</div>
      </div>`;
  }).join("");
  container.querySelectorAll(".fhist-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx, 10);
      const entry = filterHistory[idx];
      if (!entry) return;
      // Apply immediately
      selectedSet = new Set(entry.categories.filter(c => ALL_CATEGORIES.includes(c)));
      applyFilter(true);
      closeModal("filter-history");
      closeModal("filter");
      closeDetailsPanel();
      showTransientMessage(`Applied filter (${entry.categories.length} categories)`, "success", 2500);
    });
  });
}

/* ============================================================
 *  Details Panel (left side)
 * ============================================================ */
const detailsTitle   = document.getElementById("details-title");
const detailInfoPane = document.getElementById("detail-tab-info");
const detailJsonPane = document.getElementById("detail-tab-json");

function setupDetailPanel() {
  document.getElementById("panel-close").addEventListener("click", closeDetailsPanel);

  document.querySelectorAll("[data-detail-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = btn.dataset.detailTab;
      document.querySelectorAll("[data-detail-tab]").forEach(b => b.classList.toggle("active", b === btn));
      detailInfoPane.classList.toggle("active", target === "info");
      detailJsonPane.classList.toggle("active", target === "json");
    });
  });

  document.getElementById("bookmark-btn").addEventListener("click", () => {
    if (!currentDetailMapboxId) return;
    toggleBookmark(currentDetailMapboxId);
    refreshCounts();
    // also refresh list if favorites modal open
    if (document.getElementById("favorites-overlay").classList.contains("active")) renderFavTab();
  });

  document.getElementById("panel-copy-id").addEventListener("click", () => {
    if (!currentDetailMapboxId) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(currentDetailMapboxId)
        .then(() => showTransientMessage("mapbox_id copied", "success", 1500))
        .catch(() => {});
    }
  });

  // Close modal handlers
  document.querySelectorAll("[data-close]").forEach(btn => {
    btn.addEventListener("click", () => closeModal(btn.dataset.close));
  });
  document.querySelectorAll(".modal-overlay").forEach(ov => {
    ov.addEventListener("click", (e) => { if (e.target === ov) ov.classList.remove("active"); });
  });
}

function closeModal(name) {
  document.getElementById(`${name}-overlay`).classList.remove("active");
}
function closeDetailsPanel() {
  document.getElementById("details-panel").classList.remove("open");
  document.getElementById("main-screen").classList.remove("panel-open");
}

async function openDetailsPanel(mapboxId, srcProps) {
  currentDetailMapboxId = mapboxId;
  currentDetailProps    = srcProps || null;
  if (srcProps) {
    const la = typeof srcProps.lat === "number" ? srcProps.lat : parseFloat(srcProps.lat);
    const lo = typeof srcProps.lon === "number" ? srcProps.lon : parseFloat(srcProps.lon);
    if (!isNaN(la)) currentDetailLat = la;
    if (!isNaN(lo)) currentDetailLon = lo;
  }

  // ID display
  const idEl = document.getElementById("panel-id-value");
  idEl.textContent = mapboxId;
  idEl.title = mapboxId;

  detailsTitle.textContent = "POI Details";
  detailInfoPane.innerHTML = `<div class="loading">Loading...</div>`;
  detailJsonPane.querySelector(".json-view").textContent = "Loading...";
  // reset tabs to info
  document.querySelectorAll("[data-detail-tab]").forEach(b => b.classList.toggle("active", b.dataset.detailTab === "info"));
  detailInfoPane.classList.add("active");
  detailJsonPane.classList.remove("active");

  updateBookmarkButton(mapboxId);

  // open panel
  document.getElementById("details-panel").classList.add("open");
  document.getElementById("main-screen").classList.add("panel-open");

  const token = localStorage.getItem(TOKEN_KEY);
  const params = new URLSearchParams({ attribute_sets: "basic,photos,visit,venue", access_token: token });
  const url = `${DETAILS_API}${encodeURIComponent(mapboxId)}?${params.toString()}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    currentDetailProps = (data && data.properties) || currentDetailProps;
    // try to get lat/lon from geometry
    if (data && data.geometry && Array.isArray(data.geometry.coordinates)) {
      currentDetailLon = data.geometry.coordinates[0];
      currentDetailLat = data.geometry.coordinates[1];
    }
    renderDetails(data);
    detailJsonPane.querySelector(".json-view").textContent = JSON.stringify(data, null, 2);

    // update name in storage
    const name = data && data.properties && data.properties.name;
    if (name) {
      updateHistoryName(mapboxId, name);
      updateBookmarkName(mapboxId, name);
    }
  } catch (err) {
    detailInfoPane.innerHTML = `<div class="loading">Failed to load: ${escapeHtml(err.message)}</div>`;
    detailJsonPane.querySelector(".json-view").textContent = `Error: ${err.message}`;
  }
}

function renderDetails(data) {
  const props = (data && data.properties) || {};
  const meta  = props.metadata || {};
  const name = props.name || "(no name)";
  const address = props.full_address || props.address || props.place_formatted || "";
  const phone = meta.phone || "";
  const website = meta.website || "";
  const rating = meta.rating;
  const popularity = meta.popularity;
  const description = meta.detailed_description || "";
  const cuisines = Array.isArray(meta.cuisines) ? meta.cuisines : [];
  const hours = (meta.open_hours && Array.isArray(meta.open_hours.weekday_text)) ? meta.open_hours.weekday_text : [];
  const categories = parseCategories(props.poi_category || props.poi_category_ids);
  const photos = extractPhotos(props, meta);

  const flags = [];
  if (meta.delivery) flags.push("Delivery");
  if (meta.takeout) flags.push("Takeout");
  if (meta.serves_breakfast) flags.push("Breakfast");
  if (meta.serves_brunch) flags.push("Brunch");
  if (meta.serves_lunch) flags.push("Lunch");
  if (meta.serves_dinner) flags.push("Dinner");
  if (meta.serves_beer) flags.push("Beer");
  if (meta.serves_wine) flags.push("Wine");
  if (meta.serves_vegan_diet) flags.push("Vegan");
  if (meta.serves_vegetarian_diet) flags.push("Vegetarian");
  if (meta.wheelchair_accessible) flags.push("Wheelchair Accessible");

  detailsTitle.textContent = name;
  let html = "";
  if (photos.length) {
    html += `<div class="photos" style="margin-bottom:16px;">
      ${photos.map(src => `<img src="${escapeAttr(src)}" alt="" loading="lazy" />`).join("")}
    </div>`;
  }
  if (categories.length) html += field("Categories", categories.map(c => `<span class="badge">${escapeHtml(c)}</span>`).join(""));
  if (cuisines.length) html += field("Cuisines", cuisines.map(c => `<span class="badge">${escapeHtml(c)}</span>`).join(""));
  if (description) html += field("About", `<div style="font-size:13px;line-height:1.6;">${escapeHtml(description)}</div>`);
  if (address) html += field("Address", escapeHtml(address));
  if (phone) html += field("Phone", `<a href="tel:${escapeAttr(phone)}">${escapeHtml(phone)}</a>`);
  if (website) html += field("Website", `<a href="${escapeAttr(website)}" target="_blank" rel="noopener noreferrer">${escapeHtml(website)}</a>`);
  if (typeof rating === "number" || typeof popularity === "number") {
    const parts = [];
    if (typeof rating === "number") parts.push(`★ ${rating.toFixed(2)}`);
    if (typeof popularity === "number") parts.push(`<span style="color:#6b7280;font-size:12px;">popularity ${(popularity*100).toFixed(0)}%</span>`);
    html += field("Rating", parts.join("  "));
  }
  if (flags.length) html += field("Features", flags.map(f => `<span class="badge">${escapeHtml(f)}</span>`).join(""));
  if (hours.length) html += field("Hours", `<div style="font-size:13px;line-height:1.6;">${hours.map(escapeHtml).join("<br/>")}</div>`);
  if (!html) html = `<div class="loading">No information available.</div>`;
  detailInfoPane.innerHTML = html;
}

function field(label, value) {
  return `<div class="field"><div class="field-label">${escapeHtml(label)}</div><div class="field-value">${value}</div></div>`;
}

/* ============================================================
 *  Favorites / History Modal
 * ============================================================ */
function setupFavorites() {
  document.getElementById("favorites-btn").addEventListener("click", () => {
    refreshCounts();
    currentFavTab = "bookmarks";
    setFavTab("bookmarks");
    document.getElementById("favorites-overlay").classList.add("active");
  });

  document.querySelectorAll("[data-fav-tab]").forEach(btn => {
    btn.addEventListener("click", () => setFavTab(btn.dataset.favTab));
  });

  document.getElementById("export-current-list").addEventListener("click", exportCurrentList);
  document.getElementById("clear-current-list").addEventListener("click", clearCurrentList);
}

function setFavTab(tabName) {
  currentFavTab = tabName;
  document.querySelectorAll("[data-fav-tab]").forEach(b => b.classList.toggle("active", b.dataset.favTab === tabName));
  document.getElementById("fav-tab-bookmarks").classList.toggle("active", tabName === "bookmarks");
  document.getElementById("fav-tab-history").classList.toggle("active", tabName === "poiHistory");
  renderFavTab();
}

function renderFavTab() {
  if (currentFavTab === "bookmarks") renderBookmarksList();
  else renderHistoryList();
}

function renderBookmarksList() {
  const container = document.getElementById("bookmarks-list");
  const arr = [...bookmarks.entries()].map(([id, v]) => ({ id, ...v }));
  arr.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
  if (!arr.length) {
    container.innerHTML = `<div class="empty-msg">No bookmarks yet. Click ★ in a POI's details to add one.</div>`;
    return;
  }
  container.innerHTML = arr.map(item => listItemHtml(item, "bookmark")).join("");
  bindListItems(container, "bookmark");
}

function renderHistoryList() {
  const container = document.getElementById("history-list");
  const arr = [...poiHistory.entries()].map(([id, v]) => ({ id, ...v }));
  arr.sort((a, b) => (b.viewedAt || 0) - (a.viewedAt || 0));
  if (!arr.length) {
    container.innerHTML = `<div class="empty-msg">No history yet. Click a POI on the map.</div>`;
    return;
  }
  container.innerHTML = arr.map(item => listItemHtml(item, "poiHistory")).join("");
  bindListItems(container, "poiHistory");
}

function listItemHtml(item, kind) {
  const name = item.name || "(no name)";
  const cats = Array.isArray(item.categories) ? item.categories.slice(0, 3) : [];
  const more = (item.categories && item.categories.length > 3) ? `<span class="badge">+${item.categories.length - 3}</span>` : "";
  const ts = kind === "bookmark" ? item.addedAt : item.viewedAt;
  const tsLabel = kind === "bookmark" ? "Added" : "Viewed";
  const icon = kind === "bookmark" ? "★" : "⏱";
  const iconStyle = kind === "bookmark" ? "color:#f59e0b;" : "color:#6b7280;";
  return `
    <div class="list-item" data-id="${escapeAttr(item.id)}">
      <div class="list-item-icon" style="${iconStyle}">${icon}</div>
      <div class="list-item-main">
        <div class="list-item-name">${escapeHtml(name)}</div>
        <div class="list-item-meta">${escapeHtml(item.id)} · ${tsLabel}: ${escapeHtml(fmtTime(ts))}</div>
        ${cats.length ? `<div class="list-item-cats">${cats.map(c=>`<span class="badge">${escapeHtml(c)}</span>`).join("")}${more}</div>` : ""}
      </div>
      <button class="list-item-remove" data-remove-id="${escapeAttr(item.id)}" data-kind="${kind}" title="Remove">×</button>
    </div>`;
}

function bindListItems(container, kind) {
  container.querySelectorAll(".list-item").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.classList.contains("list-item-remove")) return;
      const id = el.dataset.id;
      flyToAndOpen(id, kind);
    });
  });
  container.querySelectorAll(".list-item-remove").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.removeId;
      const kindLocal = btn.dataset.kind;
      if (kindLocal === "bookmark") {
        bookmarks.delete(id);
        saveBookmarks();
        showTransientMessage("Bookmark removed", "info", 2000);
      } else {
        poiHistory.delete(id);
        saveHistory();
        showTransientMessage("History entry removed", "info", 2000);
      }
      refreshCounts();
      renderFavTab();
      if (currentDetailMapboxId === id) updateBookmarkButton(id);
    });
  });
}

function flyToAndOpen(id, kind) {
  const entry = (kind === "bookmark" ? bookmarks.get(id) : poiHistory.get(id))
    || bookmarks.get(id) || poiHistory.get(id);
  if (!entry) return;

  // Auto clear filter if active
  clearFilterIfActive();

  // close favorites modal so user sees the map
  closeModal("favorites");

  const lat = entry.lat;
  const lon = entry.lon;
  if (typeof lat === "number" && typeof lon === "number") {
    map.flyTo({ center: [lon, lat], zoom: 16, essential: true, duration: 1500 });
  }

  // Mark visited & open panel
  markVisited(id);
  // also bump poiHistory (re-viewed)
  addToHistory(id, {
    name: entry.name,
    lat, lon,
    categories: entry.categories || []
  });
  refreshCounts();

  openDetailsPanel(id, {
    mapbox_id: id,
    lat: lat,
    lon: lon,
    categories: entry.categories || [],
    name: entry.name
  });
}

function exportCurrentList() {
  const isBm = currentFavTab === "bookmarks";
  const data = isBm
    ? [...bookmarks.entries()].map(([id, v]) => ({ id, ...v }))
    : [...poiHistory.entries()].map(([id, v]) => ({ id, ...v }));
  if (!data.length) {
    showTransientMessage("Nothing to export", "warning", 2000);
    return;
  }
  const payload = {
    type: isBm ? "bookmarks" : "poiHistory",
    exportedAt: new Date().toISOString(),
    count: data.length,
    items: data
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ymd = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `mapbox-${isBm ? "bookmarks" : "poiHistory"}-${ymd}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showTransientMessage(`Exported ${data.length} item(s)`, "success", 2000);
}

function clearCurrentList() {
  const isBm = currentFavTab === "bookmarks";
  const label = isBm ? "all bookmarks" : "all poiHistory";
  if (!confirm(`Clear ${label}?`)) return;
  if (isBm) {
    bookmarks.clear();
    saveBookmarks();
  } else {
    poiHistory.clear();
    saveHistory();
    // Note: visited feature-state retained so colors stay
  }
  refreshCounts();
  renderFavTab();
  if (currentDetailMapboxId) updateBookmarkButton(currentDetailMapboxId);
}
